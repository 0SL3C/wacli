name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0). Leave empty for current branch."
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: ./.github/actions/setup-ci-env
        with:
          go-version-file: go.mod
          apt-packages: "build-essential gcc-aarch64-linux-gnu libc6-dev-arm64-cross mingw-w64"

      - name: Stash GoReleaser config
        run: cp .goreleaser-linux.yaml /tmp/.goreleaser-linux.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        run: git checkout ${{ inputs.tag }}

      - name: GoReleaser (linux/windows)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config /tmp/.goreleaser-linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ ! -z "${{ inputs.tag }}" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual runs without tag, use current commit hash or branch
            echo "RELEASE_TAG=$(git describe --tags 2>/dev/null || git rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes ""
          fi
      - name: Extract binaries from archives
        run: |
          cd dist
          for tar_file in wacli*.tar.gz; do
            # Extract to a temp dir
            mkdir -p temp_extract
            tar -xzf "$tar_file" -C temp_extract
            # Get the binary and rename it based on archive name
            if [[ "$tar_file" =~ "arm64" ]]; then
              mv temp_extract/wacli dist/wacli-linux-arm64
            elif [[ "$tar_file" =~ "amd64" ]]; then
              mv temp_extract/wacli dist/wacli-linux-amd64
            fi
          done
          rm -rf temp_extract
      - name: Upload linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/wacli-linux-amd64 \
            dist/wacli-linux-arm64 \
            dist/checksums-linux-windows.txt \
            --clobber
